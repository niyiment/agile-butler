spring:
  docker:
    compose:
      enabled: true
      lifecycle-management: start_only

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agile_butler}
    username: ${DB_USER:butler}
    password: ${DB_PASS:butler_secret}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
        default_batch_fetch_size: 16
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
    show-sql: ${HIBERNATE_SHOW_SQL:false}
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
  cache:
    type: redis
    redis:
      time-to-live: 300000        # 5 minutes default TTL


  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER:http://localhost:8080}
  web:
    error:
      include-message: always
      include-binding-errors: always


app:
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    requests-per-minute: ${RATE_LIMIT_RPM:60}

  jwt:
    secret: ${JWT_SECRET:my-ultra-secret-key-that-is-at-least-256-bits-long-for-security}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

  standup:
    default-deadline-hour: 11      # 11:00 AM team-local time
    reminder-hour: 9               # Push notification at 9:00 AM

  decision:
    live-session-max-minutes: 30
    timed-poll-max-hours: 168      # 7 days ceiling

  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS:classpath:firebase-service-account.json}

  websocket:
    allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

  sendgrid:
    api-key: ${SENDGRID_API_KEY:SG.dummy_key}
    email:
      from: ${EMAIL_FROM:info@example.com}

server:
  port: ${PORT:8080}
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.niyiment.agilebutler: ${LOGGING_LEVEL:INFO}
    org.springframework.web.socket: INFO
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG_LEVEL:INFO}
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
